{% from "macros.html" import pick_movie_button, pick_movie_button_block, user_avatar with context %}
<!-- Navbar — transparent + blur -->
<header class="navbar">
  <!-- Brand (wordmark only) -->
  <a href="/" class="navbar-brand" aria-label="Nextreel home">Nextreel</a>

  <!-- Desktop actions -->
  <nav class="navbar-actions hidden md:flex">
    <a href="/next_movie" class="navbar-link"
       onclick="event.preventDefault(); document.getElementById('pickMovieFormNav').submit();">Pick a Movie</a>
    <form id="pickMovieFormNav" method="POST" action="/next_movie" class="hidden">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    </form>
    <a href="{{ url_for('main.set_filters') }}" class="navbar-link">Filters</a>
    {% if current_user_id %}
    <div class="account-avatar-dropdown">
      <button type="button" class="account-avatar-dropdown-trigger" id="avatarBtn"
              aria-haspopup="true" aria-expanded="false" aria-controls="avatarMenu"
              aria-label="Account menu">
        {{ user_avatar(current_user, 'sm') }}
      </button>
      <div id="avatarMenu" class="account-avatar-dropdown-menu" role="menu">
        <a href="{{ url_for('main.account_view') }}?tab=profile" role="menuitem">Account</a>
        <a href="{{ url_for('main.watched_list_page') }}" role="menuitem">Watched</a>
        <form method="POST" action="/logout" style="display:contents;">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button type="submit" role="menuitem">Log out</button>
        </form>
      </div>
    </div>
    {% else %}
    <a href="/login" class="navbar-link">Log In</a>
    {% endif %}
  </nav>

  <!-- Mobile menu button -->
  <button id="menuBtn" class="navbar-link md:hidden" style="cursor:pointer; background:none; border:none; padding:0.25rem;" aria-controls="mobileMenu" aria-expanded="false" aria-label="Open menu">
    <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
  </button>
</header>

<!-- Mobile slide-down panel -->
<div id="mobileMenu" class="navbar-mobile-panel" role="dialog" aria-label="Navigation menu">
  <div class="navbar-mobile-close">
    <button id="menuClose" aria-label="Close menu">&times;</button>
  </div>
  <nav class="navbar-mobile-links">
    <a href="/next_movie"
       onclick="event.preventDefault(); document.getElementById('pickMovieFormMobile').submit();">Pick a Movie</a>
    <form id="pickMovieFormMobile" method="POST" action="/next_movie" class="hidden">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    </form>
    <a href="{{ url_for('main.set_filters') }}">Filters</a>
    {% if current_user_id %}
    <a href="{{ url_for('main.account_view') }}?tab=profile">Account</a>
    <a href="/watched">Watched</a>
    <form method="POST" action="/logout" style="display:contents;">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <button type="submit">Log Out</button>
    </form>
    {% else %}
    <a href="/login">Log In</a>
    {% endif %}
    <button id="themeToggleMobile">Toggle Theme</button>
  </nav>
</div>

<!-- Theme & mobile menu script -->
<script>
  (function() {
    function setTheme(next) {
      try { localStorage.setItem('nr-theme', next); } catch (e) {}
      document.documentElement.setAttribute('data-theme', next);
    }

    var menuBtn = document.getElementById('menuBtn');
    var menuClose = document.getElementById('menuClose');
    var mobileMenu = document.getElementById('mobileMenu');
    if (menuBtn && mobileMenu) {
      menuBtn.addEventListener('click', function () {
        mobileMenu.classList.add('open');
        menuBtn.setAttribute('aria-expanded', 'true');
      });
    }
    if (menuClose && mobileMenu) {
      menuClose.addEventListener('click', function () {
        mobileMenu.classList.remove('open');
        if (menuBtn) menuBtn.setAttribute('aria-expanded', 'false');
      });
    }

    var tm = document.getElementById('themeToggleMobile');
    if (tm) tm.addEventListener('click', function () {
      var current = document.documentElement.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    });

    var avatarBtn = document.getElementById('avatarBtn');
    var avatarMenu = document.getElementById('avatarMenu');
    if (avatarBtn && avatarMenu) {
      avatarBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        var isOpen = avatarMenu.classList.toggle('open');
        avatarBtn.setAttribute('aria-expanded', String(isOpen));
      });
      document.addEventListener('click', function () {
        avatarMenu.classList.remove('open');
        avatarBtn.setAttribute('aria-expanded', 'false');
      });
    }

    try {
      var pref = localStorage.getItem('nr-theme');
      if (pref === 'dark' || pref === 'light') setTheme(pref);
    } catch (e) {}
  })();
</script>

<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Dynamic title with movie name and year -->
    <title>{% if movie and movie.title %}{{ movie.title }}{% if movie.year %} ({{ movie.year }}){% endif %} - NextReel{% else %}Movie Details - NextReel{% endif %}</title>
    
    <!-- Bootstrap CSS removed - using Tailwind instead -->
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://image.tmdb.org" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Compiled Tailwind CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}?v={{ config.get('CSS_VERSION', '1') }}">
    {% if movie and movie.poster_url %}
    <link rel="preload" as="image" href="{{ movie.poster_url }}" fetchpriority="high" imagesizes="(min-width: 768px) 340px, 60vw">
    {% endif %}
    <script>
      (() => {
        try {
          const pref = localStorage.getItem('nr-theme');
          if (pref === 'light' || pref === 'dark') {
            document.documentElement.setAttribute('data-theme', pref);
          }
        } catch (e) {}
      })();
    </script>
    
    <style>
        :root { color-scheme: light dark; }
        body { font-family: 'DM Sans', system-ui, -apple-system, Segoe UI, Roboto, 'Helvetica Neue', Arial, sans-serif; }
        .font-brand-serif { font-family: 'Merriweather', Georgia, Cambria, 'Times New Roman', Times, serif; }
        
        /* Prevent horizontal scrolling */
        body, html {
            overflow-x: hidden;
            max-width: 100%;
        }
        
        /* Light theme background is handled by tokens via output.css */
    </style>
</head>

<body class="bg-surface text-body">

<!-- Include the modern navbar -->
{% include 'navbar_modern.html' %}

<!-- Main Content - movie_card.html uses Bootstrap's container-lg -->
{% include 'movie_card.html' %}

<!-- ── Filter Drawer ──────────────────────── -->
<button class="filter-drawer-tab" id="filterDrawerTab" aria-controls="filterDrawer" aria-expanded="false" aria-label="Open filters">FILTERS</button>

<div class="filter-drawer-backdrop" id="filterDrawerBackdrop"></div>

<aside id="filterDrawer" class="filter-drawer" role="dialog" aria-label="Movie filters" aria-modal="true">
  <div class="filter-drawer-header">
    <h2>Filters</h2>
    <button class="filter-drawer-close" id="filterDrawerClose" aria-label="Close filters">&times;</button>
  </div>

  <div class="filter-drawer-body">
    <form id="drawerFilterForm" action="/filtered_movie" method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div id="drawer-filter-errors" role="alert" aria-live="polite"></div>

      {# Include the shared partial — the JS in filter-drawer.js wraps
         sections with data-filter-group into collapsible groups #}
      {% include '_filter_form.html' %}
    </form>
  </div>

  <div class="filter-drawer-footer">
    <button type="submit" form="drawerFilterForm" id="drawerApplyBtn" class="filter-apply-btn" aria-busy="false">
      <svg class="h-4 w-4 hidden animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10" opacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10"/></svg>
      <span>Apply Filters</span>
    </button>
    <button type="reset" form="drawerFilterForm" id="drawerResetBtn" class="filter-reset-btn">Reset</button>
  </div>
</aside>

<script src="{{ url_for('static', filename='js/filter-drawer.js') }}?v={{ config.get('CSS_VERSION', '1') }}" defer></script>

</body>
</html>
